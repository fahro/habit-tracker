version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: habit-tracker
    ports:
      - "3001:3001"
    volumes:
      # Persist database
      - ./data:/app/data
    environment:
      - NODE_ENV=production
      - PORT=3001
      - AUTH_USERNAME=atomic
      - AUTH_PASSWORD=habits2024
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/api/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

  # Optional: Development mode with hot reload
  app-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: study-tracker-dev
    ports:
      - "3000:3000"  # Vite dev server
      - "3001:3001"  # API server
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
    command: npm run dev
    profiles:
      - dev
